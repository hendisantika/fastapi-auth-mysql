name: Deploy to Dev

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
  workflow_dispatch:

env:
  IMAGE_NAME: hendisantika/fastapi-auth-mysql
  CONTAINER_NAME: fastapi-auth-mysql

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy when triggered manually or after a successful Docker Publish run
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST_DEV }}
          port: ${{ secrets.SSH_PORT_DEV }}
          username: ${{ secrets.SSH_USERNAME_DEV }}
          key: ${{ secrets.SSH_PRIVATE_KEY_DEV }}
          script: |
            set -e
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              --env-file /opt/fastapi-auth-mysql/.env \
              -p 8000:8000 \
              ${{ env.IMAGE_NAME }}:latest
            docker image prune -f
