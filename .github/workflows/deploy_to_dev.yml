name: deploy to Dev with CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: hendisantika/fastapi-auth-mysql
  CONTAINER_NAME: fastapi-auth-mysql

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: fastapi_auth
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: mysql+pymysql://root:password@127.0.0.1:3306/fastapi_auth
      SECRET_KEY: test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile sources
        run: python -m compileall -q main.py routers.py models.py schemas.py database.py security.py auth.py users.py migrations

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -uroot -ppassword --silent; then
              echo "MySQL is up"; break
            fi
            echo "Waiting for MySQL..."; sleep 2
          done

      - name: Run migrations
        run: alembic upgrade head

      - name: Smoke test app import
        run: python -c "import main; print('App imported OK')"

  docker:
    needs: build
    runs-on: ubuntu-latest
    # Publish only on push to main / manual runs, never on pull requests
    if: ${{ github.event_name != 'pull_request' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.run_number }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}

    env:
      IMAGE_TAG: ${{ github.run_number }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      TZ: Asia/Jakarta
      ELASTIC_APM_SERVER_URL: ${{ secrets.ELASTIC_APM_SERVER_URL }}
      ELASTIC_APM_SERVICE_NAME: fastapi-auth
      ELASTIC_APM_ENVIRONMENT: dev
      ELASTIC_APM_SERVICE_VERSION: ${{ github.run_number }}
      ELASTIC_APM_SECRET_TOKEN: ${{ secrets.ELASTIC_APM_SECRET_TOKEN }}
      ELASTIC_APM_API_KEY: ${{ secrets.ELASTIC_APM_API_KEY }}
      LOKI_URL: ${{ secrets.LOKI_URL }}
      LOKI_LABELS: app=fastapi-auth,env=dev
      LOKI_USERNAME: ${{ secrets.LOKI_USERNAME }}
      LOKI_PASSWORD: ${{ secrets.LOKI_PASSWORD }}
      LOKI_TENANT_ID: ${{ secrets.LOKI_TENANT_ID }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST_DEV }}
          port: ${{ secrets.SSH_PORT_DEV }}
          username: ${{ secrets.SSH_USERNAME_DEV }}
          key: ${{ secrets.SSH_PRIVATE_KEY_DEV }}
          envs: IMAGE_NAME,CONTAINER_NAME,IMAGE_TAG,DATABASE_URL,SECRET_KEY,ALGORITHM,ACCESS_TOKEN_EXPIRE_MINUTES,TZ,ELASTIC_APM_SERVER_URL,ELASTIC_APM_SERVICE_NAME,ELASTIC_APM_ENVIRONMENT,ELASTIC_APM_SERVICE_VERSION,ELASTIC_APM_SECRET_TOKEN,ELASTIC_APM_API_KEY,LOKI_URL,LOKI_LABELS,LOKI_USERNAME,LOKI_PASSWORD,LOKI_TENANT_ID
          script: |
            set -e
            docker pull "$IMAGE_NAME:$IMAGE_TAG"

            # Apply database migrations against the dev MySQL before starting
            docker run --rm \
              --add-host=host.docker.internal:host-gateway \
              -e DATABASE_URL="$DATABASE_URL" \
              -e TZ="$TZ" \
              "$IMAGE_NAME:$IMAGE_TAG" \
              alembic upgrade head

            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --add-host=host.docker.internal:host-gateway \
              -e DATABASE_URL="$DATABASE_URL" \
              -e SECRET_KEY="$SECRET_KEY" \
              -e ALGORITHM="$ALGORITHM" \
              -e ACCESS_TOKEN_EXPIRE_MINUTES="$ACCESS_TOKEN_EXPIRE_MINUTES" \
              -e TZ="$TZ" \
              -e ELASTIC_APM_SERVER_URL="$ELASTIC_APM_SERVER_URL" \
              -e ELASTIC_APM_SERVICE_NAME="$ELASTIC_APM_SERVICE_NAME" \
              -e ELASTIC_APM_ENVIRONMENT="$ELASTIC_APM_ENVIRONMENT" \
              -e ELASTIC_APM_SERVICE_VERSION="$ELASTIC_APM_SERVICE_VERSION" \
              -e ELASTIC_APM_SECRET_TOKEN="$ELASTIC_APM_SECRET_TOKEN" \
              -e ELASTIC_APM_API_KEY="$ELASTIC_APM_API_KEY" \
              -e LOKI_URL="$LOKI_URL" \
              -e LOKI_LABELS="$LOKI_LABELS" \
              -e LOKI_USERNAME="$LOKI_USERNAME" \
              -e LOKI_PASSWORD="$LOKI_PASSWORD" \
              -e LOKI_TENANT_ID="$LOKI_TENANT_ID" \
              -p 8888:8000 \
              "$IMAGE_NAME:$IMAGE_TAG"
            docker image prune -f
