# Reverse proxy for fastapi.gtilabs.id -> FastAPI app on 127.0.0.1:8888
# Public TLS is terminated by Cloudflare; nginx serves HTTPS to Cloudflare
# (Cloudflare SSL/TLS mode: Full). The origin certificate lives at the paths
# referenced below (a Cloudflare Origin Certificate, or a self-signed cert).

# --- Restore the real visitor IP from Cloudflare ---------------------------
# https://www.cloudflare.com/ips/  (IPv4)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# Cloudflare IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# --- HTTP: redirect everything to HTTPS ------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name fastapi.gtilabs.id;

    return 301 https://$host$request_uri;
}

# --- HTTPS: proxy to the app ------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name fastapi.gtilabs.id;

    ssl_certificate     /etc/nginx/ssl/fastapi.gtilabs.id.pem;
    ssl_certificate_key /etc/nginx/ssl/fastapi.gtilabs.id.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/fastapi.gtilabs.id.access.log;
    error_log  /var/log/nginx/fastapi.gtilabs.id.error.log;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
