# Reverse proxy for fastapi.gtilabs.id -> FastAPI app on 127.0.0.1:8888
#
# Cloudflare SSL/TLS mode: Flexible.
#   Browser  --HTTPS-->  Cloudflare  --HTTP (port 80)-->  this origin
# No origin certificate is required. Do NOT redirect HTTP to HTTPS here, or
# Cloudflare (which connects over HTTP) will hit an infinite redirect loop.

# --- Restore the real visitor IP from Cloudflare ---------------------------
# https://www.cloudflare.com/ips/  (IPv4)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# Cloudflare IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    listen [::]:80;
    server_name fastapi.gtilabs.id;

    access_log /var/log/nginx/fastapi.gtilabs.id.access.log;
    error_log  /var/log/nginx/fastapi.gtilabs.id.error.log;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Public scheme is HTTPS (terminated at Cloudflare)
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
