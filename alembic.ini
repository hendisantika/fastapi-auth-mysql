# Alembic configuration.
# The database URL is loaded from the DATABASE_URL environment variable in
# migrations/env.py, so it is intentionally left blank here.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
# Flyway-style file names: V<rev>_DDMMYYYY_HHMM__<description>.py
# Generate with an explicit version, e.g.:
#   alembic revision --autogenerate --rev-id 2 -m "add users table"
file_template = V%%(rev)s_%%(day).2d%%(month).2d%%(year)d_%%(hour).2d%%(minute).2d__%%(slug)s
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
