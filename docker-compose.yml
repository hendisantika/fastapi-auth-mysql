services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: fastapi_auth
      TZ: Asia/Jakarta
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: hendisantika/fastapi-auth-mysql
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:password@db:3306/fastapi_auth
      SECRET_KEY: change-me-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      TZ: Asia/Jakarta
      ELASTIC_APM_SERVER_URL: ${ELASTIC_APM_SERVER_URL:-}
      ELASTIC_APM_SERVICE_NAME: ${ELASTIC_APM_SERVICE_NAME:-fastapi-auth-mysql}
      ELASTIC_APM_ENVIRONMENT: ${ELASTIC_APM_ENVIRONMENT:-production}
      ELASTIC_APM_SERVICE_VERSION: ${ELASTIC_APM_SERVICE_VERSION:-1.0.0}
      ELASTIC_APM_SECRET_TOKEN: ${ELASTIC_APM_SECRET_TOKEN:-}
      ELASTIC_APM_API_KEY: ${ELASTIC_APM_API_KEY:-}
      LOKI_URL: ${LOKI_URL:-}
      LOKI_LABELS: ${LOKI_LABELS:-app=fastapi-auth-mysql,env=local}
      LOKI_USERNAME: ${LOKI_USERNAME:-}
      LOKI_PASSWORD: ${LOKI_PASSWORD:-}
      LOKI_TENANT_ID: ${LOKI_TENANT_ID:-}
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  mysql_data:
